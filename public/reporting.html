<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Show Picker Club Reporting</title>
  <link rel="stylesheet" href="/styles.css">
  <style>
    body { padding: 24px 16px 60px; }
    .wrap { max-width: 960px; margin: 0 auto; }
    h1 { font-family: var(--font-display); font-size: var(--text-lg); font-weight: 600; letter-spacing: -0.01em; color: var(--ink); margin-bottom: 4px; }
    .subtitle { font-size: 13px; color: var(--ink-muted); margin-bottom: 24px; }

    .err { color: var(--danger-deep); font-size: 13px; margin-top: 12px; text-align: center; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }
    .card {
      background: var(--surface);
      border-radius: 8px;
      padding: 16px 12px;
      border: 1px solid var(--border-soft);
    }
    .card h3 {
      font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px;
      color: var(--ink-muted); margin-bottom: 12px; font-weight: 600; text-align: center;
    }
    .metrics { display: flex; gap: 2px; }
    .metric { flex: 1; min-width: 0; text-align: center; padding: 4px 2px; }
    .metric-val {
      font-size: 20px; font-weight: 700; color: var(--ink);
      font-variant-numeric: tabular-nums; line-height: 1.1;
    }
    .metric-lbl {
      font-size: 10px; text-transform: uppercase; letter-spacing: 0.4px;
      color: var(--ink-muted); margin-top: 4px;
    }
    .stat-row { display: flex; justify-content: space-between; align-items: baseline; padding: 4px 0; font-size: 14px; }
    .stat-row .lbl { color: var(--ink-muted); }
    .stat-row .val { font-weight: 600; color: var(--ink); font-variant-numeric: tabular-nums; }

    .section {
      background: var(--surface);
      border-radius: 8px;
      padding: 16px 20px;
      margin-bottom: 16px;
      border: 1px solid var(--border-soft);
    }
    .section h2 {
      font-size: 13px; text-transform: uppercase; letter-spacing: 0.5px;
      color: var(--ink-muted); margin-bottom: 12px; font-weight: 600;
    }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th { text-align: left; font-weight: 500; color: var(--ink-muted); padding: 6px 8px; border-bottom: 1px solid var(--border); font-size: 12px; }
    td { padding: 8px; border-bottom: 1px solid var(--border-soft); }
    td.num { text-align: right; font-variant-numeric: tabular-nums; font-weight: 500; }
    tr:last-child td { border-bottom: none; }

    .empty { color: var(--ink-faint); font-style: italic; font-size: 13px; padding: 8px 0; }
    .footer { text-align: center; color: var(--ink-faint); font-size: 12px; margin-top: 32px; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1><a href="/" style="color: var(--ink-quiet); text-decoration: none; font-size: 18px; margin-right: 8px;" title="Home">&#9664;</a>Show Picker Club Reporting</h1>
    <div class="subtitle" id="generated">Loading…</div>
    <div id="content"></div>
    <div id="loadErr" class="err"></div>
  </div>

  <script>
    function fmt(n) { return (n || 0).toLocaleString(); }
    function fmtDate(iso) {
      const d = new Date(iso);
      return d.toLocaleString(undefined, { dateStyle: 'short', timeStyle: 'short' });
    }
    function memberLabel(m) {
      const name = m.first_name || m.slug;
      return m.last_initial ? `${name} ${m.last_initial}` : name;
    }

    function windowCard(title, w) {
      return `<div class="card">
        <h3>${title}</h3>
        <div class="metrics">
          <div class="metric"><div class="metric-val">${fmt(w.week)}</div><div class="metric-lbl">Week</div></div>
          <div class="metric"><div class="metric-val">${fmt(w.month)}</div><div class="metric-lbl">Month</div></div>
          <div class="metric"><div class="metric-val">${fmt(w.all_time)}</div><div class="metric-lbl">All Time</div></div>
        </div>
      </div>`;
    }

    function dwmCard(title, w) {
      return `<div class="card">
        <h3>${title}</h3>
        <div class="metrics">
          <div class="metric"><div class="metric-val">${fmt(w.day)}</div><div class="metric-lbl">Day</div></div>
          <div class="metric"><div class="metric-val">${fmt(w.week)}</div><div class="metric-lbl">Week</div></div>
          <div class="metric"><div class="metric-val">${fmt(w.month)}</div><div class="metric-lbl">Month</div></div>
        </div>
      </div>`;
    }

    function renderReport(d) {
      document.getElementById('generated').textContent = 'Generated ' + fmtDate(d.generated_at);

      const totals = d.totals || {};

      const html = `
        <div class="grid">
          ${windowCard('New shows', d.new_shows)}
          ${windowCard('Edits', d.edited_shows)}
          ${windowCard('Archived', d.archived_shows)}
          ${windowCard('New members', d.new_members)}
          ${dwmCard('Active members', d.active_members || {})}
        </div>

        <div class="section">
          <h2>Totals</h2>
          <div class="grid" style="margin-bottom:0;">
            <div class="card">
              <h3>Members</h3>
              <div class="metrics">
                <div class="metric"><div class="metric-val">${fmt(totals.members)}</div><div class="metric-lbl">Total</div></div>
              </div>
            </div>
            <div class="card">
              <h3>Shows</h3>
              <div class="metrics">
                <div class="metric"><div class="metric-val">${fmt(totals.active_shows)}</div><div class="metric-lbl">Active</div></div>
                <div class="metric"><div class="metric-val">${fmt(totals.archived_shows)}</div><div class="metric-lbl">Archived</div></div>
              </div>
            </div>
            <div class="card">
              <h3>By list</h3>
              <div class="metrics">
                <div class="metric"><div class="metric-val">${fmt(totals.watching)}</div><div class="metric-lbl">Watching</div></div>
                <div class="metric"><div class="metric-val">${fmt(totals.waiting)}</div><div class="metric-lbl">Waiting</div></div>
                <div class="metric"><div class="metric-val">${fmt(totals.recommending)}</div><div class="metric-lbl">Rec</div></div>
                <div class="metric"><div class="metric-val">${fmt(totals.next)}</div><div class="metric-lbl">Next</div></div>
              </div>
            </div>
          </div>
        </div>

        <div class="section">
          <h2>Top networks</h2>
          ${d.top_networks.length === 0 ? '<div class="empty">None.</div>' : `
            <table>
              <thead><tr><th>Network</th><th class="num">Active shows</th></tr></thead>
              <tbody>
                ${d.top_networks.map(n => `<tr>
                  <td>${n.network}</td>
                  <td class="num">${fmt(n.cnt)}</td>
                </tr>`).join('')}
              </tbody>
            </table>
          `}
        </div>

        <div class="section">
          <h2>Most-shared shows</h2>
          ${d.top_shared.length === 0 ? '<div class="empty">No shows on multiple lists yet.</div>' : `
            <table>
              <thead><tr><th>Show</th><th class="num">Members</th></tr></thead>
              <tbody>
                ${d.top_shared.map(s => `<tr>
                  <td>${s.title}</td>
                  <td class="num">${fmt(s.members)}</td>
                </tr>`).join('')}
              </tbody>
            </table>
          `}
        </div>

        <div class="footer">Edits exclude automated enrichment (tracked separately as enriched_at).</div>
      `;
      document.getElementById('content').innerHTML = html;
    }

    fetch('/api/reporting')
      .then(r => {
        if (r.status === 401) {
          document.getElementById('generated').textContent = '';
          document.getElementById('loadErr').innerHTML = 'Please <a href="/">log in</a> from the homepage to view reporting.';
          return null;
        }
        return r.ok ? r.json() : Promise.reject(`HTTP ${r.status}`);
      })
      .then(data => { if (data) renderReport(data); })
      .catch(err => {
        document.getElementById('generated').textContent = '';
        document.getElementById('loadErr').textContent = 'Failed to load: ' + err;
      });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>URL Cleanup</title>
  <link rel="stylesheet" href="/styles.css?v=4">
  <style>
    .remaining { font-size: var(--text-sm); color: var(--ink-muted); margin-bottom: 20px; }

    .login {
      background: var(--surface);
      padding: 24px;
      border-radius: 10px;
      box-shadow: var(--shadow-card);
      max-width: 380px;
      margin: 0 auto;
    }
    .login label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 6px; color: var(--ink-muted); }
    .login input {
      width: 100%; padding: 10px 12px;
      border: 1px solid var(--border); border-radius: 6px;
      font-size: 15px; font-family: inherit;
    }
    .login input:focus { outline: none; border-color: var(--accent); box-shadow: var(--focus-ring); }
    .login button {
      width: 100%; margin-top: 16px; padding: 12px;
      background: var(--accent); color: var(--ink); border: none; border-radius: 6px;
      font-size: 15px; font-weight: 700; cursor: pointer;
    }
    .login button:hover { background: var(--accent-hover); }

    .section-head {
      font-family: var(--font-display); font-size: var(--text-md); font-weight: 600;
      color: var(--ink); margin: 18px 0 4px;
    }
    .section-blurb { color: var(--ink-muted); font-size: 13px; margin-bottom: 12px; line-height: 1.5; }
    .row.conflict { border-color: color-mix(in oklch, var(--accent) 35%, transparent); }
    .row.mismatch { border-color: color-mix(in oklch, var(--danger) 30%, transparent); }
    .row.conflict .row-form, .row.mismatch .row-form {
      grid-template-columns: 1fr auto;
      gap: 8px;
    }
    .row.mismatch .row-form { grid-template-columns: 1fr 1fr; }
    @media (max-width: 560px) {
      .row.mismatch .row-form { grid-template-columns: 1fr; }
    }

    .row {
      background: var(--surface);
      border-radius: 8px;
      padding: 14px 16px;
      margin-bottom: 10px;
      border: 1px solid var(--border-soft);
      transition: opacity 0.25s, transform 0.25s;
    }
    .row.removing { opacity: 0; transform: translateX(20px); }

    .row-head {
      display: flex; align-items: baseline; gap: 8px;
      flex-wrap: wrap; margin-bottom: 10px;
    }
    .show-link {
      font-size: 16px; font-weight: 600; color: var(--ink);
      text-decoration: underline; text-decoration-color: var(--ink-faint);
      text-underline-offset: 3px;
    }
    .show-link:hover { color: var(--accent); text-decoration-color: var(--accent); }
    .show-meta { font-size: 12px; color: var(--ink-muted); }
    .current-url {
      font-size: 11px; color: var(--danger-deep);
      width: 100%; word-break: break-all; margin-top: 2px;
    }

    .row-form {
      display: grid;
      grid-template-columns: minmax(140px, 180px) 1fr auto;
      gap: 8px;
      align-items: center;
    }
    .row-form select, .row-form input {
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: 5px;
      font-size: 14px;
      font-family: inherit;
      background: var(--surface);
      min-width: 0;
    }
    .row-form select:focus, .row-form input:focus { outline: none; border-color: var(--accent); box-shadow: var(--focus-ring); }
    .row-form .other-input { display: none; grid-column: 1 / -1; margin-top: 4px; }
    .row-form .other-input.show { display: block; }
    .btn-update {
      padding: 8px 14px;
      background: var(--accent); color: var(--ink);
      border: none; border-radius: 5px;
      font-size: 14px; font-weight: 700;
      cursor: pointer; font-family: inherit;
      white-space: nowrap;
    }
    .btn-update:hover { background: var(--accent-hover); }
    .btn-update:disabled { background: var(--ink-faint); cursor: not-allowed; }

    /* Quiet escape hatch: the title is right, stop flagging it. */
    .btn-dismiss {
      grid-column: 1 / -1;
      padding: 8px 14px;
      background: transparent; color: var(--ink-muted);
      border: 1px solid var(--border); border-radius: 5px;
      font-size: 13px; cursor: pointer; font-family: inherit;
    }
    .btn-dismiss:hover { color: var(--ink); border-color: var(--ink-faint); }
    .btn-dismiss:disabled { opacity: 0.5; cursor: not-allowed; }

    .row-err {
      grid-column: 1 / -1;
      font-size: 12px; color: var(--danger-deep); margin-top: 4px;
    }

    .empty {
      text-align: center; padding: 60px 0;
      color: var(--ink-muted); font-style: italic; font-size: 16px;
    }
    .err-banner {
      background: var(--danger-soft); color: var(--danger-deep);
      border: 1px solid color-mix(in oklch, var(--danger) 30%, transparent);
      padding: 12px; border-radius: 6px;
      font-size: 13px; margin-bottom: 16px;
    }
    .loading {
      text-align: center; padding: 60px 0;
      color: var(--ink-muted); font-size: 15px;
    }
    .spinner {
      display: inline-block; width: 28px; height: 28px;
      border: 3px solid var(--border); border-top-color: var(--accent);
      border-radius: 50%; animation: spin 0.8s linear infinite;
      margin-bottom: 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 540px) {
      .row-form { grid-template-columns: 1fr; }
      /* 16px stops iOS Safari from auto-zooming on focus */
      .row-form select, .row-form input { font-size: 16px; }
    }
  </style>
</head>
<body class="admin-page">
  <div class="admin-wrap">
    <nav class="admin-nav">
      <a href="/" class="back" aria-label="Back to Show Picker Club">&#9664;</a>
      <a href="/admin">Admin</a>
      <a href="/members">Members</a>
      <a href="/url-cleanup" class="current">URL cleanup</a>
      <a href="/vibe-admin">Vibe admin</a>
    </nav>
    <h1 class="admin-title">URL cleanup</h1>
    <div class="remaining" id="remaining"></div>

    <div class="login" id="login" style="display:none;">
      <div id="loginMsg">Log in as the operator first at <a href="/patrick">showpicker.club/patrick</a> (tap Edit, enter your code), then reload this page.</div>
    </div>

    <div id="bannerErr"></div>
    <div id="conflicts"></div>
    <div id="mismatches"></div>
    <div id="badTitles"></div>
    <div id="list"></div>
  </div>

  <script>
    const el = (id) => document.getElementById(id);
    const login = el('login');
    const loginMsg = el('loginMsg');
    const list = el('list');
    const remaining = el('remaining');
    const bannerErr = el('bannerErr');

    let networks = [];

    // Auth is the operator's session cookie — no secret to enter. Load
    // straight away; a 403 surfaces the login hint.
    loadList();

    function escapeHtml(s) {
      return String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }
    function escapeAttr(s) { return escapeHtml(s); }
    function safeUrl(url) {
      if (!url || typeof url !== 'string') return '#';
      const t = url.trim();
      return /^https?:\/\//i.test(t) ? t : '#';
    }
    function googleSearchUrl(title, network) {
      const q = network ? `${title} on ${network}` : title;
      return 'https://www.google.com/search?q=' + encodeURIComponent(q);
    }

    function networkOptionsHtml(currentValue) {
      const opts = ['<option value="">Select…</option>'];
      networks.forEach(n => {
        const sel = (n === currentValue) ? ' selected' : '';
        opts.push(`<option value="${escapeAttr(n)}"${sel}>${escapeHtml(n)}</option>`);
      });
      const otherSel = (currentValue && !networks.includes(currentValue)) ? ' selected' : '';
      opts.push(`<option value="__other"${otherSel}>Network not listed</option>`);
      return opts.join('');
    }

    function rowHtml(show) {
      const otherValue = (show.network && !networks.includes(show.network)) ? show.network : '';
      const otherClass = otherValue ? ' show' : '';
      const linkText = `${escapeHtml(show.title)} on ${escapeHtml(show.network || '???')}`;
      const sharedNote = show.member_count > 1
        ? `<span class="show-meta">${show.member_count} lists &middot; ${escapeHtml(show.members)}</span>`
        : `<span class="show-meta">${escapeHtml(show.members)}</span>`;
      return `
        <div class="row" data-id="${show.id}">
          <div class="row-head">
            <a class="show-link" target="_blank" rel="noopener noreferrer"
               href="${googleSearchUrl(show.title, show.network)}">${linkText}</a>
            ${sharedNote}
            <div class="current-url">${show.network_url ? 'current: ' + escapeHtml(show.network_url) : 'no URL set'}</div>
          </div>
          <div class="row-form">
            <select class="net-select">${networkOptionsHtml(show.network)}</select>
            <input type="text" class="url-input" placeholder="Paste direct URL" autocomplete="off">
            <button class="btn-update" type="button">Update</button>
            <input type="text" class="other-input${otherClass}" placeholder="New network name" value="${escapeAttr(otherValue)}">
            <input type="text" class="title-input" placeholder="Fix title" value="${escapeAttr(show.title)}" autocomplete="off">
            <button class="btn-rename" type="button">Rename</button>
            <div class="row-err"></div>
          </div>
        </div>
      `;
    }

    function attachRowHandlers(rowEl) {
      const sel = rowEl.querySelector('.net-select');
      const other = rowEl.querySelector('.other-input');
      const url = rowEl.querySelector('.url-input');
      const btn = rowEl.querySelector('.btn-update');
      const errBox = rowEl.querySelector('.row-err');

      sel.addEventListener('change', () => {
        if (sel.value === '__other') {
          other.classList.add('show');
          other.focus();
        } else {
          other.classList.remove('show');
        }
      });

      url.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') { e.preventDefault(); btn.click(); }
      });

      btn.addEventListener('click', async () => {
        errBox.textContent = '';
        const network = (sel.value === '__other' ? other.value : sel.value).trim();
        const newUrl = url.value.trim();
        if (!network) { errBox.textContent = 'Pick a network.'; return; }
        if (!newUrl) { errBox.textContent = 'Paste a URL.'; return; }
        btn.disabled = true;
        const oldText = btn.textContent;
        btn.textContent = '…';
        try {
          const res = await fetch('/api/admin-url-cleanup', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              action: 'save',
              id: parseInt(rowEl.dataset.id, 10),
              network, network_url: newUrl,
            }),
          });
          const data = await res.json().catch(() => ({}));
          if (!res.ok) {
            errBox.textContent = data.error || `Error (${res.status})`;
            btn.disabled = false;
            btn.textContent = oldText;
            return;
          }
          // If new network, refresh networks list (cheap: append locally).
          if (!networks.includes(network)) {
            networks.push(network);
            networks.sort((a, b) => a.toLowerCase().localeCompare(b.toLowerCase()));
          }
          rowEl.classList.add('removing');
          setTimeout(() => {
            rowEl.remove();
            updateRemaining(-1);
          }, 250);
        } catch (e) {
          errBox.textContent = 'Network error: ' + e.message;
          btn.disabled = false;
          btn.textContent = oldText;
        }
      });

      // Fix a wrong/typo'd title: renames every member's copy and re-enriches.
      const titleInput = rowEl.querySelector('.title-input');
      const renameBtn = rowEl.querySelector('.btn-rename');
      titleInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') { e.preventDefault(); renameBtn.click(); }
      });
      renameBtn.addEventListener('click', async () => {
        errBox.textContent = '';
        const newTitle = titleInput.value.trim();
        if (!newTitle) { errBox.textContent = 'Enter a title.'; return; }
        renameBtn.disabled = true;
        const old = renameBtn.textContent;
        renameBtn.textContent = '…';
        try {
          const res = await fetch('/api/admin-url-cleanup', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              action: 'fix_title',
              id: parseInt(rowEl.dataset.id, 10),
              new_title: newTitle,
            }),
          });
          const data = await res.json().catch(() => ({}));
          if (!res.ok) {
            errBox.textContent = data.error || `Error (${res.status})`;
          } else {
            const finalTitle = data.new_title || newTitle;
            rowEl.querySelector('.show-link').textContent = finalTitle;
            titleInput.value = finalTitle;
            const n = data.updated || 0;
            errBox.textContent = `Renamed to "${finalTitle}" across ${n} cop${n === 1 ? 'y' : 'ies'}.`;
          }
        } catch (e) {
          errBox.textContent = 'Network error: ' + e.message;
        }
        renameBtn.disabled = false;
        renameBtn.textContent = old;
      });
    }

    function updateRemaining(delta) {
      const n = list.querySelectorAll('.row').length;
      remaining.textContent = `${n} show${n === 1 ? '' : 's'} remaining`;
      if (n === 0) {
        list.innerHTML = '<div class="empty">🎉 Queue empty. All shows have direct URLs.</div>';
      }
    }

    function renderConflicts(conflicts) {
      const root = document.getElementById('conflicts');
      if (!conflicts.length) { root.innerHTML = ''; return; }
      root.innerHTML = `
        <div class="section-head">Cross-member network conflicts</div>
        <div class="section-blurb">Members disagree on which service carries the show. Pick the canonical answer and we'll unify all rows; URLs that came from a wrong-network propagation are cleared so the next fill picks the right one.</div>
        ${conflicts.map(c => `
          <div class="row conflict" data-title="${escapeAttr(c.title)}">
            <div class="row-head">
              <span class="show-link">${escapeHtml(c.title)}</span>
              <span class="show-meta">${c.rows} rows · ${escapeHtml(c.networks.join(', '))}</span>
            </div>
            <div class="row-form">
              <select class="conflict-net">${[''].concat(c.networks, networks.filter(n => !c.networks.includes(n))).map(n => `<option value="${escapeAttr(n)}">${n || '— pick canonical —'}</option>`).join('')}</select>
              <button class="btn-update conflict-save" type="button">Unify</button>
            </div>
          </div>
        `).join('')}
      `;
      root.querySelectorAll('.conflict-save').forEach(btn => {
        btn.addEventListener('click', async () => {
          const row = btn.closest('.row');
          const title = row.dataset.title;
          const net = row.querySelector('.conflict-net').value.trim();
          if (!net) return;
          btn.disabled = true; btn.textContent = 'Saving…';
          try {
            const res = await fetch('/api/admin-url-cleanup', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ action: 'resolve_conflict', title, network: net }),
            });
            const data = await res.json();
            if (!res.ok) { alert(data.error || `Error (${res.status})`); btn.disabled = false; btn.textContent = 'Unify'; return; }
            row.classList.add('removing');
            setTimeout(() => row.remove(), 250);
          } catch (e) { alert('Network error: ' + e.message); btn.disabled = false; btn.textContent = 'Unify'; }
        });
      });
    }

    function renderMismatches(mismatches) {
      const root = document.getElementById('mismatches');
      if (!mismatches.length) { root.innerHTML = ''; return; }
      root.innerHTML = `
        <div class="section-head">URL doesn't match network</div>
        <div class="section-blurb">The stored URL points at a different service than the row's network. Pick which side wins. "Keep URL" rewrites the network to match. "Keep network" clears the URL so the next fill picks the right one.</div>
        ${mismatches.map(m => `
          <div class="row mismatch" data-id="${m.id}">
            <div class="row-head">
              <span class="show-link">${escapeHtml(m.title)}</span>
              <span class="show-meta">${escapeHtml(m.member)} · network: <strong>${escapeHtml(m.network)}</strong> · URL points at <strong>${escapeHtml(m.url_network)}</strong></span>
              <div class="current-url"><a href="${escapeAttr(safeUrl(m.network_url))}" target="_blank">${escapeHtml(m.network_url)}</a></div>
            </div>
            <div class="row-form">
              <button class="btn-update mismatch-url" type="button">Keep URL · become ${escapeHtml(m.url_network)}</button>
              <button class="btn-update mismatch-network" type="button">Keep ${escapeHtml(m.network)} · clear URL</button>
            </div>
          </div>
        `).join('')}
      `;
      root.querySelectorAll('.mismatch-url, .mismatch-network').forEach(btn => {
        btn.addEventListener('click', async () => {
          const row = btn.closest('.row');
          const id = parseInt(row.dataset.id, 10);
          const keep = btn.classList.contains('mismatch-url') ? 'url' : 'network';
          btn.disabled = true;
          const orig = btn.textContent; btn.textContent = 'Saving…';
          try {
            const res = await fetch('/api/admin-url-cleanup', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ action: 'fix_mismatch', id, keep }),
            });
            const data = await res.json();
            if (!res.ok) { alert(data.error || `Error (${res.status})`); btn.disabled = false; btn.textContent = orig; return; }
            row.classList.add('removing');
            setTimeout(() => row.remove(), 250);
          } catch (e) { alert('Network error: ' + e.message); btn.disabled = false; btn.textContent = orig; }
        });
      });
    }

    function renderBadTitles(badTitles) {
      const root = document.getElementById('badTitles');
      if (!badTitles.length) { root.innerHTML = ''; return; }
      root.innerHTML = `
        <div class="section-head">Wrong titles (no poster match)</div>
        <div class="section-blurb">These have a working link, but no poster ever matched the stored name — usually a made-up title ("Juul Documentary" &rarr; "Big Vape: The Rise and Fall of Juul"), sometimes a real one the poster databases just don't carry. Loading this page already tried recovering the real name from each show's own link; the ones below couldn't be fixed automatically. Fix the name — and the network too if it's wrong — and every member's copy is updated and re-enriched. If the name and network are already right, dismiss it and it stays off this list for good.</div>
        ${badTitles.map(show => `
          <div class="row" data-id="${show.id}">
            <div class="row-head">
              <a class="show-link" target="_blank" rel="noopener noreferrer"
                 href="${googleSearchUrl(show.title, show.network)}">${escapeHtml(show.title)} on ${escapeHtml(show.network || '???')}</a>
              <span class="show-meta">${show.member_count > 1 ? show.member_count + ' lists &middot; ' : ''}${escapeHtml(show.members)}</span>
            </div>
            <div class="row-form">
              <select class="net-select">${networkOptionsHtml(show.network)}</select>
              <input type="text" class="title-input" placeholder="Correct title" value="${escapeAttr(show.title)}" autocomplete="off">
              <button class="btn-update btn-rename" type="button">Save</button>
              <input type="text" class="other-input" placeholder="New network name">
              <button class="btn-dismiss" type="button">Title is right — stop flagging it</button>
              <div class="row-err"></div>
            </div>
          </div>
        `).join('')}
      `;
      root.querySelectorAll('.row').forEach(rowEl => {
        const titleInput = rowEl.querySelector('.title-input');
        const netSelect = rowEl.querySelector('.net-select');
        const otherInput = rowEl.querySelector('.other-input');
        const renameBtn = rowEl.querySelector('.btn-rename');
        const dismissBtn = rowEl.querySelector('.btn-dismiss');
        const errBox = rowEl.querySelector('.row-err');
        dismissBtn.addEventListener('click', async () => {
          errBox.textContent = '';
          dismissBtn.disabled = true;
          const old = dismissBtn.textContent;
          dismissBtn.textContent = '…';
          try {
            const res = await fetch('/api/admin-url-cleanup', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ action: 'dismiss_title', id: parseInt(rowEl.dataset.id, 10) }),
            });
            const data = await res.json().catch(() => ({}));
            if (!res.ok) {
              errBox.textContent = data.error || `Error (${res.status})`;
              dismissBtn.disabled = false;
              dismissBtn.textContent = old;
              return;
            }
            rowEl.classList.add('removing');
            setTimeout(() => rowEl.remove(), 250);
          } catch (e) {
            errBox.textContent = 'Network error: ' + e.message;
            dismissBtn.disabled = false;
            dismissBtn.textContent = old;
          }
        });
        netSelect.addEventListener('change', () => {
          if (netSelect.value === '__other') { otherInput.classList.add('show'); otherInput.focus(); }
          else otherInput.classList.remove('show');
        });
        titleInput.addEventListener('keydown', (e) => {
          if (e.key === 'Enter') { e.preventDefault(); renameBtn.click(); }
        });
        renameBtn.addEventListener('click', async () => {
          errBox.textContent = '';
          const newTitle = titleInput.value.trim();
          const network = (netSelect.value === '__other' ? otherInput.value : netSelect.value).trim();
          if (!newTitle) { errBox.textContent = 'Enter a title.'; return; }
          renameBtn.disabled = true;
          const old = renameBtn.textContent;
          renameBtn.textContent = '…';
          try {
            const res = await fetch('/api/admin-url-cleanup', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                action: 'fix_title',
                id: parseInt(rowEl.dataset.id, 10),
                new_title: newTitle,
                network: network || undefined,
              }),
            });
            const data = await res.json().catch(() => ({}));
            if (!res.ok) {
              errBox.textContent = data.error || `Error (${res.status})`;
              renameBtn.disabled = false;
              renameBtn.textContent = old;
              return;
            }
            rowEl.classList.add('removing');
            setTimeout(() => rowEl.remove(), 250);
          } catch (e) {
            errBox.textContent = 'Network error: ' + e.message;
            renameBtn.disabled = false;
            renameBtn.textContent = old;
          }
        });
      });
    }

    async function loadList() {
      bannerErr.innerHTML = '';
      remaining.textContent = '';
      list.innerHTML = '<div class="loading"><div class="spinner"></div><div>Loading queue&hellip;<br>Syncing good URLs across members first; this can take up to a minute.</div></div>';
      try {
        const res = await fetch('/api/admin-url-cleanup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'list' }),
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) {
          list.innerHTML = '';
          if (res.status === 403) {
            login.style.display = 'block';
            return;
          }
          bannerErr.innerHTML = `<div class="err-banner">${escapeHtml(data.error || `Error (${res.status})`)}</div>`;
          return;
        }
        login.style.display = 'none';
        networks = data.networks || [];
        const shows = data.shows || [];
        const conflicts = data.conflicts || [];
        const mismatches = data.mismatches || [];
        const badTitles = data.bad_titles || [];
        const autoFixed = data.auto_fixed || [];
        renderConflicts(conflicts);
        renderMismatches(mismatches);
        renderBadTitles(badTitles);
        const queueSummary = `${shows.length} show${shows.length === 1 ? '' : 's'} remaining`;
        const extras = [];
        if (conflicts.length) extras.push(`${conflicts.length} cross-network conflict${conflicts.length === 1 ? '' : 's'}`);
        if (mismatches.length) extras.push(`${mismatches.length} URL/network mismatch${mismatches.length === 1 ? 'es' : 'es'}`);
        if (badTitles.length) extras.push(`${badTitles.length} wrong title${badTitles.length === 1 ? '' : 's'}`);
        if (autoFixed.length) extras.push(`${autoFixed.length} title${autoFixed.length === 1 ? '' : 's'} auto-fixed (${autoFixed.map(f => `"${f.old_title}" → "${f.new_title}"`).join(', ')})`);
        remaining.textContent = extras.length ? `${queueSummary} · ${extras.join(' · ')}` : queueSummary;
        if (shows.length === 0) {
          list.innerHTML = '<div class="empty">🎉 Queue empty. All shows have direct URLs.</div>';
        } else {
          list.innerHTML = shows.map(rowHtml).join('');
          list.querySelectorAll('.row').forEach(attachRowHandlers);
        }
      } catch (e) {
        list.innerHTML = '';
        bannerErr.innerHTML = `<div class="err-banner">Network error: ${escapeHtml(e.message)}</div>`;
      }
    }
  </script>
</body>
</html>

name: Apply D1 migration

# Migrations are NOT auto-applied on deploy (deploy.yml only ships
# public/ + functions/). Run this manually after merging a migration that
# adds or changes columns the Functions rely on — otherwise the deployed
# code references columns the production database doesn't have yet.
#
# Actions tab → "Apply D1 migration" → Run workflow → pick the file.
on:
  workflow_dispatch:
    inputs:
      file:
        description: "Migration file (path from repo root) to apply to shows-db"
        required: true
        default: "migrations/015_seasons_released.sql"

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install wrangler
        run: npm install -g wrangler@latest

      - name: Apply migration to production D1
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: wrangler d1 execute shows-db --remote --file="${{ inputs.file }}"
